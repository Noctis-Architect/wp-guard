name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build EXE
        shell: cmd
        run: build\windows\build.bat

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/dist/WPGuard -DestinationPath WPGuard-Windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WPGuard-Windows-x64
          path: WPGuard-Windows-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: WPGuard-Windows-x64.zip
          generate_release_notes: true
